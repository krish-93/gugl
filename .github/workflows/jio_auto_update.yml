name: Generate Jio Raw M3U

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install cryptography requests

      - name: Run Jio Generator Script
        run: python generate_jio.py

      - name: Commit and push updated files
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # కంటెంట్ మారకపోయినా టైమ్ అప్‌డేట్ అవ్వడానికి ఈ లైన్ యాడ్ చేశాం
          echo "# Last Refreshed: $(date)" >> gio.m3u
          
          git add gio.m3u
          git commit -m "chore: auto-refresh Jio M3U at $(date -u)" || echo "No changes to commit"
          git push
