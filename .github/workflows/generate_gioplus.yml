name: Generate GioPlus M3U

on:
  schedule:
    # Runs every 30 minutes (at minute 20 and 50) to prevent token expiration
    - cron: '20,50 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install cryptography

      - name: Run GioPlus Generator Script
        run: python generate_gioplus.py

      - name: Commit and push updated files
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add gioplus.m3u
          # ✅ KEEP-ALIVE FIX: Always commit. Timestamp ensures content changes.
          git commit -m "chore: auto-refresh GioPlus M3U at $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
          git push || echo "Nothing to push"
