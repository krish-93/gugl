name: Omni M3U Generator

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install cryptography

      - name: Run Omni Generator Script
        run: python generate_omni.py

      - name: Commit and push updated files
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add helloworld.m3u
          # ✅ KEEP-ALIVE FIX: Always commit (no diff check).
          # Timestamp in the encrypted file ensures content always changes,
          # keeping the repo active so GitHub never disables this workflow.
          git commit -m "chore: auto-refresh M3U at $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
          git push || echo "Nothing to push"
